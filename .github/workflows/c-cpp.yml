name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get install -y libncurses-dev

    - name: Build
      run: make

    - name: Test
      run: make test

    - name: Test (AddressSanitizer)
      run: make test-debug

    - name: Build (AddressSanitizer)
      run: make debug
